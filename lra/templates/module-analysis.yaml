name: module-analysis
description: 模块分析文档模板
version: "1.0"
template_engine: jinja2

structure: |
  # {{ module_name }} 模块
  
  > 分析时间：{{ analyzed_at }}
  > 文件数：{{ file_count }} | 代码行数：{{ line_count }} | 文档覆盖：{{ doc_coverage }}%
  
  ## 概述
  
  {{ description or "（待补充模块概述）" }}
  
  {% if main_classes %}
  ## 核心类
  
  | 类名 | 说明 |
  |------|------|
  {% for cls in classes %}
  | `{{ cls.name }}` | {{ cls.docstring or "-" }} |
  {% endfor %}
  {% endif %}
  
  {% if main_functions %}
  ## 核心函数
  
  | 函数名 | 参数 | 说明 |
  |--------|------|------|
  {% for func in functions %}
  | `{{ func.name }}` | {{ func.parameters }} | {{ func.docstring or "-" }} |
  {% endfor %}
  {% endif %}
  
  ## 依赖关系
  
  ### 本模块依赖
  
  {% for dep in dependencies %}
  - {{ dep }}
  {% endfor %}
  
  ## 使用示例
  
  ```{{ language }}
  # 待补充
  ```
  
  ## 改进建议
  
  - 补充模块概述文档
  - 添加使用示例
  - 完善核心函数注释

states:
  - pending
  - in_progress
  - completed

transitions:
  pending: [in_progress]
  in_progress: [completed]
  completed: []

acceptance:
  - 文档已更新
  - 更新内容与业务需求一致
  - 格式规范