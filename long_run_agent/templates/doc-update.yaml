name: doc-update
description: 文档更新任务模板
version: "1.0"
template_engine: jinja2
keywords: ["文档", "更新", "docs", "documentation", "readme", "api"]

structure: |
  # {{ id }}
  
  ## 关联业务任务
  {% if dependencies %}
  {% for dep in dependencies %}
  - {{ dep }}
  {% endfor %}
  {% else %}
  <!-- 无关联业务任务 -->
  {% endif %}
  
  ## 模块名称
  {{ module }}
  
  ## 更新范围
  {{ update_scope }}
  
  ## 用户需求
  {{ user_demand }}
  
  ## 需更新的文档列表
  <!-- Agent 自动定位 -->
  - [ ] {{ module }}/README.md
  - [ ] docs/{{ module }}/API.md
  - [ ] src/{{ module }}/__init__.py (docstring)
  
  ## 更新内容
  <!-- 增量更新，仅修改相关片段 -->
  
  ## 更新说明
  <!-- 记录更新原因和内容 -->

states:
  - pending
  - in_progress
  - completed

transitions:
  pending: [in_progress]
  in_progress: [completed]
  completed: []

acceptance:
  - 文档已更新
  - 更新内容与业务需求一致
  - 格式规范
